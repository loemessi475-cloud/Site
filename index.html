<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>My Stream</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body onload="init()">

<header>
  <h1>My Stream</h1>
  <input type="text" id="search" placeholder="חיפוש..." oninput="searchAll()">
</header>

<div id="hero"></div>

<h2>🎬 סרטים</h2>
<div id="movies" class="grid"></div>

<h2>📺 סדרות</h2>
<div id="series" class="grid"></div>

<h2>📡 ערוצים חיים</h2>
<div id="channelsContainer"></div>

<div id="playerModal" class="modal" onclick="closePlayer()">
  <video id="videoPlayer" controls></video>
</div>

<script src="app.js"></script>
</body>
</html>
